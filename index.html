<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITUATION ROOM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;600&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg: #08090d;
            --surface: #0d1117;
            --surface-2: #151b23;
            --accent: #00d4aa;
            --accent-dim: rgba(0, 212, 170, 0.10);
            --accent-glow: rgba(0, 212, 170, 0.4);
            --positive: #00e676;
            --negative: #ff5252;
            --warning: #ffab40;
            --text: #d4d4d4;
            --text-dim: #5a6578;
            --border: rgba(0, 212, 170, 0.15);
            --border-hover: rgba(0, 212, 170, 0.45);
            --gold: #ffd700;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Exo 2', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 1.2rem;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,212,170,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,170,0.025) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: -1;
        }

        /* ─── HEADER ─── */
        .header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 1.2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            opacity: 0;
            animation: fadeUp 0.5s ease forwards;
        }

        .header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.8rem;
            letter-spacing: 0.15em;
            color: var(--accent);
            text-shadow: 0 0 30px var(--accent-glow);
        }

        .header-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 0.08em;
        }

        .header .live-badge {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.15em;
            color: var(--accent);
            background: var(--accent-dim);
            border: 1px solid var(--border);
            padding: 0.25rem 0.7rem;
            border-radius: 2px;
        }

        .live-badge .dot {
            width: 5px; height: 5px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        /* ─── FINANCIAL TICKER ─── */
        .ticker-wrap {
            width: 100%;
            overflow: hidden;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            margin-bottom: 1rem;
            padding: 0.5rem 0;
            position: relative;
            opacity: 0;
            animation: fadeUp 0.5s 0.1s ease forwards;
        }

        .ticker-wrap::before,
        .ticker-wrap::after {
            content: '';
            position: absolute;
            top: 0; bottom: 0;
            width: 60px;
            z-index: 10;
            pointer-events: none;
        }
        .ticker-wrap::before {
            left: 0;
            background: linear-gradient(to right, var(--bg), transparent);
        }
        .ticker-wrap::after {
            right: 0;
            background: linear-gradient(to left, var(--bg), transparent);
        }

        .ticker-track {
            display: flex;
            gap: 0;
            animation: tickerScroll 60s linear infinite;
            white-space: nowrap;
        }

        .ticker-track:hover { animation-play-state: paused; }

        @keyframes tickerScroll {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .ticker-item {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.2rem 1.2rem;
            border-right: 1px solid rgba(255,255,255,0.05);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            flex-shrink: 0;
        }

        .ticker-item .ticker-name {
            color: var(--text-dim);
            font-size: 0.62rem;
            letter-spacing: 0.05em;
        }

        .ticker-item .ticker-price {
            color: var(--text);
            font-weight: 500;
        }

        .ticker-item .ticker-change {
            font-size: 0.62rem;
            font-weight: 600;
        }

        .ticker-item.up .ticker-change { color: var(--positive); }
        .ticker-item.down .ticker-change { color: var(--negative); }

        /* ─── WIDGET GRID ─── */
        .widget-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 0.8rem;
        }

        .widget {
            background: var(--surface);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: fadeUp 0.5s ease forwards;
        }

        .widget:hover {
            border-color: var(--border-hover);
            box-shadow: 0 0 24px rgba(0, 212, 170, 0.07);
        }

        /* Corner brackets */
        .widget::before, .widget::after {
            content: '';
            position: absolute;
            width: 10px; height: 10px;
            border-color: var(--accent);
            border-style: solid;
            opacity: 0.4;
            z-index: 10;
            transition: opacity 0.2s;
        }
        .widget:hover::before, .widget:hover::after { opacity: 0.8; }
        .widget::before { top: 5px; left: 5px; border-width: 1px 0 0 1px; }
        .widget::after { bottom: 5px; right: 5px; border-width: 0 1px 1px 0; }

        .widget-header {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.7rem 1rem;
            border-bottom: 1px solid var(--border);
            background: rgba(0,212,170,0.025);
        }

        .widget-num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.55rem;
            font-weight: 600;
            color: var(--accent);
            background: var(--accent-dim);
            padding: 0.15rem 0.35rem;
            letter-spacing: 0.05em;
        }

        .widget-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.95rem;
            letter-spacing: 0.1em;
            color: var(--text);
        }

        .widget-body { position: relative; }

        /* Market overview — spans 8 cols */
        #widget-markets { grid-column: span 8; animation-delay: 0.1s; }

        /* News — spans 4 cols */
        #widget-news { grid-column: span 4; animation-delay: 0.2s; }

        /* Flight — full width */
        #widget-flight {
            grid-column: span 12;
            animation-delay: 0.3s;
        }

        /* GitHub — spans 4 cols */
        #widget-github { grid-column: span 4; animation-delay: 0.4s; }

        /* Webcam — spans 4 cols */
        #widget-webcam { grid-column: span 4; animation-delay: 0.5s; }

        /* Commodities — spans 4 cols */
        #widget-commodities { grid-column: span 4; animation-delay: 0.6s; }

        /* ─── MARKET CARDS ─── */
        .market-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0;
        }

        .market-card {
            padding: 0.8rem 1rem;
            border-right: 1px solid rgba(255,255,255,0.04);
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .market-card:last-child { border-right: none; }

        .market-card .mkt-label {
            font-size: 0.6rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.25rem;
        }

        .market-card .mkt-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.62rem;
            color: var(--text-dim);
            margin-bottom: 0.3rem;
        }

        .market-card .mkt-price {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.15rem;
        }

        .market-card .mkt-change {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .market-card .mkt-change.up { color: var(--positive); }
        .market-card .mkt-change.down { color: var(--negative); }
        .market-card .mkt-change.neutral { color: var(--text-dim); }

        /* ─── COMMODITY/CRYPTO CARDS ─── */
        .commodity-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0;
        }

        .comm-card {
            padding: 0.7rem 0.9rem;
            border-right: 1px solid rgba(255,255,255,0.04);
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .comm-card:nth-child(2n) { border-right: none; }

        .comm-card .comm-label {
            font-size: 0.58rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.2rem;
        }

        .comm-card .comm-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: var(--text-dim);
            margin-bottom: 0.2rem;
        }

        .comm-card .comm-price {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.1rem;
        }

        .comm-card .comm-change {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.62rem;
            font-weight: 500;
        }

        .comm-card .comm-change.up { color: var(--positive); }
        .comm-card .comm-change.down { color: var(--negative); }

        /* ─── NEWS LIST ─── */
        .item-list {
            max-height: 320px;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .item-list::-webkit-scrollbar { width: 2px; }
        .item-list::-webkit-scrollbar-thumb { background: var(--border); }

        .item {
            padding: 0.55rem 0.7rem;
            border-bottom: 1px solid rgba(255,255,255,0.035);
        }
        .item:last-child { border-bottom: none; }
        .item:hover { background: rgba(0,212,170,0.04); }

        .item-title {
            font-size: 0.75rem;
            color: var(--text);
            text-decoration: none;
            line-height: 1.35;
            display: block;
            transition: color 0.2s;
        }
        .item-title:hover { color: var(--accent); }

        .item-meta {
            display: flex;
            gap: 0.6rem;
            margin-top: 0.2rem;
            font-size: 0.6rem;
            color: var(--text-dim);
        }
        .item-meta .source { color: var(--accent); font-family: 'JetBrains Mono', monospace; }

        /* ─── WEBCAM ─── */
        .webcam-wrap {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
        }
        .webcam-wrap iframe {
            width: 100%; height: 100%;
            border: none;
            display: block;
        }

        /* ─── FLIGHT MAP ─── */
        .map-wrap {
            position: relative;
            height: 280px;
        }
        #opensky-map { width: 100%; height: 100%; }

        .map-overlay {
            position: absolute;
            top: 8px; right: 8px;
            z-index: 1000;
            background: rgba(8,9,13,0.88);
            border: 1px solid var(--border);
            padding: 0.4rem 0.7rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: var(--text-dim);
            letter-spacing: 0.08em;
        }
        .map-overlay .val { color: var(--accent); font-weight: 600; margin-left: 0.25rem; }

        /* Scanline on map */
        .map-wrap::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,212,170,0.012) 2px, rgba(0,212,170,0.012) 4px);
            pointer-events: none;
            z-index: 500;
        }

        /* ─── FOOTER ─── */
        .widget-footer {
            padding: 0.35rem 1rem;
            border-top: 1px solid var(--border);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.55rem;
            color: var(--text-dim);
            letter-spacing: 0.08em;
        }

        /* Loading */
        .loading-msg {
            padding: 1rem;
            text-align: center;
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            color: var(--text-dim);
            text-transform: uppercase;
        }
        .loading-msg::after { content: '...'; animation: dots 1.5s steps(4) infinite; }

        /* ─── ANIMATIONS ─── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%,100% { opacity: 1; box-shadow: 0 0 0 0 var(--accent-glow); }
            50%      { opacity: 0.6; box-shadow: 0 0 0 4px transparent; }
        }

        @keyframes dots {
            0%,100% { content: ''; }
            25%      { content: '.'; }
            50%      { content: '..'; }
            75%      { content: '...'; }
        }

        /* Leaflet dark */
        .leaflet-container { background: #0a0d12; }
        .leaflet-popup-content-wrapper {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
        }
        .leaflet-popup-tip { background: var(--surface-2); }
        .leaflet-popup-content strong { color: var(--accent); }
        .leaflet-popup-content small { color: var(--text-dim); }

        /* Responsive */
        @media (max-width: 1100px) {
            #widget-markets { grid-column: span 12; }
            #widget-news { grid-column: span 12; }
            #widget-github { grid-column: span 6; }
            #widget-webcam { grid-column: span 6; }
            #widget-commodities { grid-column: span 12; }
            .market-grid { grid-template-columns: repeat(4, 1fr); }
        }
        @media (max-width: 700px) {
            .widget-grid { grid-template-columns: 1fr; }
            [id*="widget-"] { grid-column: span 1 !important; }
            .header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <h1>SITUATION ROOM</h1>
        <div class="header-time" id="header-time">—</div>
        <div class="live-badge">
            <span class="dot"></span>
            LIVE
        </div>
    </header>

    <!-- FINANCIAL TICKER -->
    <div class="ticker-wrap">
        <div class="ticker-track" id="ticker-track">
            <div class="loading-msg" style="padding: 0.2rem 1rem;">Loading market data</div>
        </div>
    </div>

    <!-- WIDGET GRID -->
    <div class="widget-grid">

        <!-- [01] MARKET OVERVIEW — 8 cols -->
        <div class="widget" id="widget-markets">
            <div class="widget-header">
                <span class="widget-num">01</span>
                <span class="widget-title">MARKET OVERVIEW</span>
            </div>
            <div class="widget-body">
                <div class="market-grid" id="market-grid">
                    <div class="loading-msg">Loading market data...</div>
                </div>
            </div>
            <div class="widget-footer" id="markets-updated">—</div>
        </div>

        <!-- [02] AI NEWS — 4 cols -->
        <div class="widget" id="widget-news">
            <div class="widget-header">
                <span class="widget-num">02</span>
                <span class="widget-title">AI INTELLIGENCE</span>
            </div>
            <div class="item-list" id="news-list">
                <div class="loading-msg">Loading</div>
            </div>
            <div class="widget-footer" id="news-updated">—</div>
        </div>

        <!-- [03] FLIGHT — 12 cols full width -->
        <div class="widget" id="widget-flight">
            <div class="widget-header">
                <span class="widget-num">03</span>
                <span class="widget-title">GLOBAL AIRSPACE — OPEN SKY NETWORK</span>
            </div>
            <div class="map-wrap">
                <div class="map-overlay">AIRCRAFT<span class="val" id="flight-count">—</span></div>
                <div id="opensky-map"></div>
            </div>
        </div>

        <!-- [04] GITHUB — 4 cols -->
        <div class="widget" id="widget-github">
            <div class="widget-header">
                <span class="widget-num">04</span>
                <span class="widget-title">GITHUB TRENDING</span>
            </div>
            <div class="item-list" id="github-list">
                <div class="loading-msg">Loading</div>
            </div>
            <div class="widget-footer" id="github-updated">—</div>
        </div>

        <!-- [05] WEBCAM — 4 cols -->
        <div class="widget" id="widget-webcam">
            <div class="widget-header">
                <span class="widget-num">05</span>
                <span class="widget-title">TEHRAN — 德黑兰</span>
            </div>
            <div class="webcam-wrap">
                <iframe src="https://www.youtube.com/embed/JboXN7CuKxc?autoplay=1&mute=1"
                    title="Tehran Live Cam" allowfullscreen loading="lazy"></iframe>
            </div>
        </div>

        <!-- [06] COMMODITIES & CRYPTO — 4 cols -->
        <div class="widget" id="widget-commodities">
            <div class="widget-header">
                <span class="widget-num">06</span>
                <span class="widget-title">COMMODITIES & CRYPTO</span>
            </div>
            <div class="commodity-grid" id="comm-grid">
                <div class="loading-msg">Loading...</div>
            </div>
            <div class="widget-footer" id="comm-updated">—</div>
        </div>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    // ─────────────────────────────────────────
    // MARKET DATA — Yahoo Finance via browser
    // ─────────────────────────────────────────
    const MARKET_SYMBOLS = [
        { sym: '^GSPC',    name: 'S&P 500',      cat: 'US' },
        { sym: '^DJI',     name: 'DOW JONES',    cat: 'US' },
        { sym: '^IXIC',    name: 'NASDAQ',       cat: 'US' },
        { sym: '^VIX',     name: 'VIX',          cat: 'US' },
        { sym: '^RUT',     name: 'RUSSELL',      cat: 'US' },
        { sym: '000001.SS', name: 'SSE',         cat: 'CN' },
        { sym: '399001.SZ', name: 'SZSE',        cat: 'CN' },
        { sym: '399006.SZ', name: 'CHINEXT',     cat: 'CN' },
        { sym: '^HSI',     name: 'HANG SENG',    cat: 'HK' },
        { sym: '^N225',    name: 'NIKKEI',       cat: 'JP' },
        { sym: '^BSESN',   name: 'SENSEX',       cat: 'IN' },
        { sym: '^GDAXI',   name: 'DAX',          cat: 'EU' },
        { sym: '^FCHI',    name: 'CAC40',        cat: 'EU' },
    ];

    const COMM_SYMBOLS = [
        { sym: 'GC=F',    name: 'GOLD',        label: 'XAU/USD' },
        { sym: 'CL=F',    name: 'WTI OIL',     label: 'CRUDE' },
        { sym: 'BTC-USD', name: 'BITCOIN',     label: 'BTC' },
        { sym: 'ETH-USD', name: 'ETHEREUM',    label: 'ETH' },
    ];

    async function fetchYF(symbol) {
        try {
            const resp = await fetch(
                `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?interval=1d&range=3d`,
                { headers: { 'User-Agent': 'Mozilla/5.0', 'Accept': 'application/json' } }
            );
            if (!resp.ok) throw new Error(resp.status);
            const d = await resp.json();
            const result = d.chart?.result?.[0];
            if (!result) return null;
            const closes = result.indicators?.quote?.[0]?.close || [];
            const validCloses = closes.filter(v => v !== null);
            if (validCloses.length < 1) return null;
            return {
                price: validCloses[validCloses.length - 1],
                prev: validCloses[validCloses.length - 2] ?? validCloses[0],
            };
        } catch { return null; }
    }

    async function fetchMarketData() {
        const grid = document.getElementById('market-grid');
        const updated = document.getElementById('markets-updated');
        const ticker = document.getElementById('ticker-track');

        const results = await Promise.all(
            MARKET_SYMBOLS.map(async (s) => {
                const d = await fetchYF(s.sym);
                if (!d) return { ...s, price: null, change: null, pct: null };
                const chg = d.price - d.prev;
                const pct = d.prev !== 0 ? (chg / d.prev) * 100 : 0;
                return { ...s, price: d.price, change: chg, pct };
            })
        );

        // Market cards
        grid.innerHTML = results.map(s => {
            if (s.price === null) return `<div class="market-card"><div class="mkt-label">${s.name}</div><div class="mkt-price">—</div></div>`;
            const up = s.pct >= 0;
            const cls = up ? 'up' : 'down';
            const sign = up ? '+' : '';
            return `
            <div class="market-card">
                <div class="mkt-label">${s.cat}</div>
                <div class="mkt-name">${s.name}</div>
                <div class="mkt-price">${s.price.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})}</div>
                <div class="mkt-change ${cls}">${up?'▲':'▼'} ${sign}${s.pct.toFixed(2)}%</div>
            </div>`;
        }).join('');

        // Ticker track (duplicate for seamless loop)
        const tickerItems = results.map(s => {
            if (s.price === null) return '';
            const up = s.pct >= 0;
            const cls = up ? 'up' : 'down';
            const sign = up ? '+' : '';
            return `<div class="ticker-item ${cls}">
                <span class="ticker-name">${s.name}</span>
                <span class="ticker-price">${s.price.toLocaleString('en-US', {minimumFractionDigits:1, maximumFractionDigits:1})}</span>
                <span class="ticker-change">${sign}${s.pct.toFixed(2)}%</span>
            </div>`;
        }).join('');

        // Duplicate for seamless loop
        ticker.innerHTML = tickerItems + tickerItems;

        updated.textContent = `UPDATED ${new Date().toLocaleTimeString()}`;
    }

    async function fetchCommData() {
        const grid = document.getElementById('comm-grid');
        const updated = document.getElementById('comm-updated');

        const results = await Promise.all(
            COMM_SYMBOLS.map(async (s) => {
                const d = await fetchYF(s.sym);
                if (!d) return { ...s, price: null, change: null, pct: null };
                const chg = d.price - d.prev;
                const pct = d.prev !== 0 ? (chg / d.prev) * 100 : 0;
                return { ...s, price: d.price, change: chg, pct };
            })
        );

        grid.innerHTML = results.map(s => {
            if (s.price === null) return `<div class="comm-card"><div class="comm-label">${s.label}</div><div class="comm-price">—</div></div>`;
            const up = s.pct >= 0;
            const cls = up ? 'up' : 'down';
            const sign = up ? '+' : '';
            return `<div class="comm-card">
                <div class="comm-label">${s.label}</div>
                <div class="comm-name">${s.name}</div>
                <div class="comm-price">${s.price.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})}</div>
                <div class="comm-change ${cls}">${up?'▲':'▼'} ${sign}${s.pct.toFixed(2)}%</div>
            </div>`;
        }).join('');

        updated.textContent = `UPDATED ${new Date().toLocaleTimeString()}`;
    }

    // ─────────────────────────────────────────
    // NEWS / GITHUB
    // ─────────────────────────────────────────
    async function loadNews() {
        const list = document.getElementById('news-list');
        const updated = document.getElementById('news-updated');
        try {
            const resp = await fetch('data/ainews.json');
            const data = await resp.json();
            if (!data.items?.length) { list.innerHTML = '<div class="loading-msg">No data</div>'; return; }
            list.innerHTML = data.items.slice(0, 10).map(item => `
                <div class="item">
                    <a class="item-title" href="${item.link}" target="_blank">${item.title}</a>
                    <div class="item-meta"><span class="source">${item.source}</span><span>${item.published || ''}</span></div>
                </div>`).join('');
            updated.textContent = `UPDATED ${data.updated}`;
        } catch { list.innerHTML = '<div class="loading-msg">Failed</div>'; }
    }

    async function loadGithub() {
        const list = document.getElementById('github-list');
        const updated = document.getElementById('github-updated');
        try {
            const resp = await fetch('data/github.json');
            const data = await resp.json();
            if (!data.items?.length) { list.innerHTML = '<div class="loading-msg">No data</div>'; return; }
            list.innerHTML = data.items.slice(0, 8).map(item => `
                <div class="item">
                    <a class="item-title" href="${item.link}" target="_blank">${item.title}</a>
                    <div class="item-meta"><span class="source">${item.author || 'GitHub'}</span></div>
                </div>`).join('');
            updated.textContent = `UPDATED ${data.updated}`;
        } catch { list.innerHTML = '<div class="loading-msg">Failed</div>'; }
    }

    // ─────────────────────────────────────────
    // FLIGHT MAP
    // ─────────────────────────────────────────
    const map = L.map('opensky-map', { center: [20, 0], zoom: 2, zoomControl: true, attributionControl: false });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { subdomains: 'abcd', maxZoom: 19 }).addTo(map);
    const planeIcon = L.divIcon({ html: '<div style="font-size:12px;filter:hue-rotate(160deg) drop-shadow(0 0 3px #00d4aa);">✈</div>', iconSize: [16, 16], iconAnchor: [8, 8], className: '' });
    let flightMarkers = [];

    async function loadFlights() {
        try {
            const resp = await fetch('https://opensky-network.org/api/states/all');
            if (!resp.ok) return;
            const data = await resp.json();
            const states = data.states || [];
            flightMarkers.forEach(m => map.removeLayer(m));
            flightMarkers = [];
            document.querySelector('#flight-count').textContent = states.length;
            states.forEach(state => {
                if (!state) return;
                const [,callsign,,,lon,lat,alt,,vel,track] = state;
                if (lat == null || lon == null) return;
                const info = `<strong>${(callsign||'').trim()||'UNKNOWN'}</strong><br/><small>Alt: ${alt?Math.round(alt).toLocaleString()+' ft':'—'}</small><br/><small>Speed: ${vel?Math.round(vel)+' kt':'—'}</small><br/><small>Track: ${track?Math.round(track)+'°':'—'}</small>`;
                const marker = L.marker([lat, lon], { icon: planeIcon }).bindPopup(info).addTo(map);
                flightMarkers.push(marker);
            });
        } catch (e) { console.warn(e); }
    }

    // ─────────────────────────────────────────
    // CLOCK
    // ─────────────────────────────────────────
    function updateClock() {
        const now = new Date();
        document.getElementById('header-time').textContent =
            now.toLocaleString('en-US', { weekday: 'short', month: 'short', day: 'numeric',
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false,
                timeZone: 'Asia/Shanghai' }) + ' CST';
    }

    // ─────────────────────────────────────────
    // INIT
    // ─────────────────────────────────────────
    updateClock();
    setInterval(updateClock, 1000);

    fetchMarketData();
    fetchCommData();
    loadNews();
    loadGithub();
    loadFlights();

    setInterval(fetchMarketData, 30000);
    setInterval(fetchCommData, 30000);
    setInterval(loadNews, 60000);
    setInterval(loadGithub, 60000);
    setInterval(loadFlights, 30000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 2rem;
        }
        h1 { font-size: 2.5rem; margin-bottom: 1rem; color: #6c5ce7; }
        p { font-size: 1.2rem; color: #888; }
        .placeholder { 
            margin-top: 2rem; 
            padding: 2rem;
            border: 2px dashed #333;
            border-radius: 12px;
            color: #555;
        }
        .webcam-section { margin-top: 2rem; }
        .webcam-title { 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 0.1em; 
            color: #888; 
            margin-bottom: 1rem; 
            border-bottom: 1px solid #222;
            padding-bottom: 0.5rem;
        }
        .webcam-container {
            position: relative;
            width: 100%;
            max-width: 720px;
            aspect-ratio: 16/9;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a2a4a;
            background: #000;
        }
        .webcam-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .webcam-label {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>📊 Dashboard</h1>
    <p>Information collection dashboard</p>

    <div class="webcam-section">
        <div class="webcam-title">📷 TEHRAN — 德黑兰</div>
        <div class="webcam-container">
            <iframe 
                src="https://www.youtube.com/embed/JboXN7CuKxc?autoplay=1&mute=1" 
                title="Tehran Live Cam"
                allowfullscreen
                loading="lazy">
            </iframe>
        </div>
        <div class="webcam-label">Tehran, Iran — Live View</div>
    </div>
</body>
</html>

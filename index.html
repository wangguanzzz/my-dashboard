<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { text-align: center; }
        h1 { font-size: 2.5rem; margin-bottom: 1rem; color: #6c5ce7; }
        p { font-size: 1.2rem; color: #888; }
        .placeholder { 
            margin-top: 2rem; 
            padding: 2rem;
            border: 2px dashed #333;
            border-radius: 12px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Dashboard</h1>
        <p>Information collection dashboard</p>
        <div class="placeholder">
            <p>Widgets and data visualizations coming soon...</p>
        </div>
    </div>
</body>
</html>

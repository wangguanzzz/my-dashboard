<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 2rem;
        }
        h1 { font-size: 2.5rem; margin-bottom: 1rem; color: #6c5ce7; }
        p { font-size: 1.2rem; color: #888; }
        .section { margin-top: 2rem; }
        .section-title { 
            font-size: 0.8rem; 
            text-transform: uppercase; 
            letter-spacing: 0.1em; 
            color: #888; 
            margin-bottom: 1rem; 
            border-bottom: 1px solid #222;
            padding-bottom: 0.5rem;
        }
        .webcam-container {
            position: relative;
            width: 100%;
            max-width: 720px;
            aspect-ratio: 16/9;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a2a4a;
            background: #000;
        }
        .webcam-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .webcam-label {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: #666;
        }
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            max-width: 720px;
        }
        .news-item {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            padding: 0.8rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        .news-title {
            font-size: 0.9rem;
            color: #e0e0e0;
            line-height: 1.4;
            text-decoration: none;
        }
        .news-title:hover { color: #6c5ce7; }
        .news-meta {
            font-size: 0.72rem;
            color: #555;
            display: flex;
            gap: 0.8rem;
        }
        .news-source { color: #6c5ce7; }
        .loading { color: #666; font-style: italic; }
        .updated { font-size: 0.72rem; color: #444; margin-top: 1rem; }
    </style>
</head>
<body>
    <h1>📊 Dashboard</h1>
    <p>Information collection dashboard</p>

    <div class="section">
        <div class="section-title">[01] 📷 TEHRAN — 德黑兰</div>
        <div class="webcam-container">
            <iframe 
                src="https://www.youtube.com/embed/JboXN7CuKxc?autoplay=1&mute=1" 
                title="Tehran Live Cam"
                allowfullscreen
                loading="lazy">
            </iframe>
        </div>
        <div class="webcam-label">Tehran, Iran — Live View</div>
    </div>

    <div class="section">
        <div class="section-title">[02] 🤖 AI NEWS</div>
        <div class="news-list" id="news-list">
            <div class="loading">Loading...</div>
        </div>
        <div class="updated" id="updated"></div>
    </div>

    <script>
    async function loadNews() {
        const list = document.getElementById('news-list');
        const updated = document.getElementById('updated');
        
        try {
            const resp = await fetch('data/ainews.json');
            const data = await resp.json();
            
            if (!data.items || data.items.length === 0) {
                list.innerHTML = '<div class="loading">No items</div>';
                return;
            }
            
            list.innerHTML = data.items.map(item => `
                <div class="news-item">
                    <a class="news-title" href="${item.link}" target="_blank">${item.title}</a>
                    <div class="news-meta">
                        <span class="news-source">${item.source}</span>
                        <span>${item.published}</span>
                    </div>
                </div>
            `).join('');
            
            updated.textContent = `Updated: ${data.updated}`;
        } catch (e) {
            list.innerHTML = '<div style="color:#ff4757">Failed to load news</div>';
            console.warn(e);
        }
    }
    
    loadNews();
    setInterval(loadNews, 60000);
    </script>
</body>
</html>

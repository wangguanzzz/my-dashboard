<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 2rem;
        }
        h1 { font-size: 2rem; margin-bottom: 1.5rem; color: #6c5ce7; }
        p { font-size: 1.1rem; color: #888; margin-bottom: 1.5rem; }

        /* 2-column grid for widgets */
        .widget-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .section { margin-top: 0; }
        .section-title { 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 0.1em; 
            color: #888; 
            margin-bottom: 0.8rem; 
            border-bottom: 1px solid #222;
            padding-bottom: 0.5rem;
        }

        /* Webcam widget */
        .webcam-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #2a2a4a;
            background: #000;
        }
        .webcam-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .webcam-label {
            margin-top: 0.4rem;
            font-size: 0.8rem;
            color: #555;
        }

        /* News widget */
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            max-height: 300px;
            overflow-y: auto;
        }
        .news-list::-webkit-scrollbar { width: 4px; }
        .news-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        .news-item {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 6px;
            padding: 0.6rem 0.8rem;
        }
        .news-title {
            font-size: 0.82rem;
            color: #ccc;
            line-height: 1.35;
            text-decoration: none;
            display: block;
        }
        .news-title:hover { color: #6c5ce7; }
        .news-meta {
            font-size: 0.68rem;
            color: #444;
            margin-top: 0.2rem;
            display: flex;
            gap: 0.6rem;
        }
        .news-source { color: #6c5ce7; }
        .loading { color: #555; font-style: italic; font-size: 0.85rem; }
        .updated { font-size: 0.68rem; color: #333; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <h1>📊 Dashboard</h1>
    <p>Information collection dashboard</p>

    <div class="widget-grid">
        <div class="section" id="widget-01">
            <div class="section-title">[01] 📷 TEHRAN — 德黑兰</div>
            <div class="webcam-container">
                <iframe 
                    src="https://www.youtube.com/embed/JboXN7CuKxc?autoplay=1&mute=1" 
                    title="Tehran Live Cam"
                    allowfullscreen
                    loading="lazy">
                </iframe>
            </div>
            <div class="webcam-label">Tehran, Iran — Live View</div>
        </div>

        <div class="section" id="widget-02">
            <div class="section-title">[02] 🤖 AI NEWS</div>
            <div class="news-list" id="news-list">
                <div class="loading">Loading...</div>
            </div>
            <div class="updated" id="news-updated"></div>
        </div>
    </div>

    <script>
    async function loadNews() {
        const list = document.getElementById('news-list');
        const updated = document.getElementById('news-updated');
        
        try {
            const resp = await fetch('data/ainews.json');
            const data = await resp.json();
            
            if (!data.items || data.items.length === 0) {
                list.innerHTML = '<div class="loading">No items</div>';
                return;
            }
            
            list.innerHTML = data.items.slice(0, 10).map(item => `
                <div class="news-item">
                    <a class="news-title" href="${item.link}" target="_blank">${item.title}</a>
                    <div class="news-meta">
                        <span class="news-source">${item.source}</span>
                        <span>${item.published || ''}</span>
                    </div>
                </div>
            `).join('');
            
            updated.textContent = `Updated: ${data.updated}`;
        } catch (e) {
            list.innerHTML = '<div class="loading">Failed to load</div>';
            console.warn(e);
        }
    }
    
    loadNews();
    setInterval(loadNews, 60000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITUATION ROOM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;600&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg: #08090d;
            --surface: #0d1117;
            --surface-2: #151b23;
            --accent: #00d4aa;
            --accent-dim: rgba(0, 212, 170, 0.12);
            --accent-glow: rgba(0, 212, 170, 0.4);
            --alert: #ff6b35;
            --text: #d4d4d4;
            --text-dim: #5a6578;
            --border: rgba(0, 212, 170, 0.18);
            --border-hover: rgba(0, 212, 170, 0.5);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Exo 2', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
            overflow-x: hidden;
        }

        /* Noise texture overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        /* Grid overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0, 212, 170, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 170, 0.03) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: -1;
        }

        /* Header */
        .header {
            display: flex;
            align-items: baseline;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
            opacity: 0;
            animation: fadeUp 0.6s ease forwards;
        }

        .header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.2rem;
            letter-spacing: 0.15em;
            color: var(--accent);
            text-shadow: 0 0 40px var(--accent-glow);
        }

        .header .tagline {
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--text-dim);
            font-weight: 300;
        }

        .header .live-badge {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            color: var(--accent);
            background: var(--accent-dim);
            border: 1px solid var(--border);
            padding: 0.3rem 0.8rem;
            border-radius: 2px;
        }

        .live-badge .dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        /* Widget grid */
        .widget-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: auto auto;
            gap: 1.2rem;
        }

        /* Widget base */
        .widget {
            background: var(--surface);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: fadeUp 0.6s ease forwards;
        }

        .widget:hover {
            border-color: var(--border-hover);
            box-shadow: 0 0 30px rgba(0, 212, 170, 0.08);
        }

        /* Corner brackets decoration */
        .widget::before,
        .widget::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            border-color: var(--accent);
            border-style: solid;
            opacity: 0.5;
            z-index: 10;
        }
        .widget::before {
            top: 6px; left: 6px;
            border-width: 1px 0 0 1px;
        }
        .widget::after {
            bottom: 6px; right: 6px;
            border-width: 0 1px 1px 0;
        }

        .widget-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.9rem 1.2rem;
            border-bottom: 1px solid var(--border);
            background: rgba(0, 212, 170, 0.03);
        }

        .widget-num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--accent);
            background: var(--accent-dim);
            padding: 0.2rem 0.45rem;
            letter-spacing: 0.05em;
        }

        .widget-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 0.12em;
            color: var(--text);
        }

        .widget-body { position: relative; }

        /* Webcam widget */
        #widget-01 { animation-delay: 0.1s; }
        #widget-02 { animation-delay: 0.2s; }
        #widget-03 { animation-delay: 0.3s; }
        #widget-04 { animation-delay: 0.4s; }

        .webcam-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
        }
        .webcam-wrap iframe {
            width: 100%; height: 100%;
            border: none;
            display: block;
        }
        .webcam-label {
            padding: 0.5rem 1rem;
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            text-transform: uppercase;
            border-top: 1px solid var(--border);
            background: rgba(0,0,0,0.3);
        }

        /* News / GitHub widgets */
        .item-list {
            max-height: 280px;
            overflow-y: auto;
            padding: 0.6rem;
        }
        .item-list::-webkit-scrollbar { width: 3px; }
        .item-list::-webkit-scrollbar-track { background: transparent; }
        .item-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .item {
            padding: 0.65rem 0.8rem;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: background 0.2s;
        }
        .item:last-child { border-bottom: none; }
        .item:hover { background: rgba(0, 212, 170, 0.05); }

        .item-title {
            font-size: 0.78rem;
            color: var(--text);
            text-decoration: none;
            line-height: 1.4;
            display: block;
            transition: color 0.2s;
        }
        .item-title:hover { color: var(--accent); }

        .item-meta {
            display: flex;
            gap: 0.8rem;
            margin-top: 0.25rem;
            font-size: 0.62rem;
            color: var(--text-dim);
        }
        .item-meta .source { color: var(--accent); font-family: 'JetBrains Mono', monospace; }

        .widget-footer {
            padding: 0.4rem 1rem;
            border-top: 1px solid var(--border);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.58rem;
            color: var(--text-dim);
            letter-spacing: 0.08em;
        }

        /* Flight map widget - full width */
        #widget-03 {
            grid-column: 1 / -1;
            animation-delay: 0.3s;
        }

        .map-wrap {
            position: relative;
            height: 320px;
        }
        #opensky-map { width: 100%; height: 100%; }

        .map-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: rgba(8, 9, 13, 0.88);
            border: 1px solid var(--border);
            padding: 0.5rem 0.8rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--text-dim);
            letter-spacing: 0.08em;
        }
        .map-overlay .val {
            color: var(--accent);
            font-weight: 600;
            margin-left: 0.3rem;
        }

        /* Map scanline effect */
        .map-wrap::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 212, 170, 0.015) 2px,
                rgba(0, 212, 170, 0.015) 4px
            );
            pointer-events: none;
            z-index: 500;
        }

        /* Loading state */
        .loading-msg {
            padding: 1.5rem;
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            color: var(--text-dim);
            text-transform: uppercase;
        }
        .loading-msg::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 var(--accent-glow); }
            50%       { opacity: 0.6; box-shadow: 0 0 0 4px transparent; }
        }

        @keyframes dots {
            0%   { content: ''; }
            25%  { content: '.'; }
            50%  { content: '..'; }
            75%  { content: '...'; }
            100% { content: ''; }
        }

        /* Leaflet dark overrides */
        .leaflet-container { background: #0a0d12; }
        .leaflet-popup-content-wrapper {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .leaflet-popup-tip { background: var(--surface-2); }
        .leaflet-popup-content small {
            color: var(--text-dim);
            font-size: 0.62rem;
        }
        .leaflet-popup-content strong { color: var(--accent); }

        /* Responsive */
        @media (max-width: 900px) {
            .widget-grid { grid-template-columns: 1fr; }
            #widget-03 { grid-column: 1; }
            .header h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>SITUATION ROOM</h1>
        <span class="tagline">Global Intelligence Feed</span>
        <div class="live-badge">
            <span class="dot"></span>
            LIVE
        </div>
    </header>

    <div class="widget-grid">
        <!-- [01] Webcam -->
        <div class="widget" id="widget-01">
            <div class="widget-header">
                <span class="widget-num">01</span>
                <span class="widget-title">TEHRAN — 德黑兰</span>
            </div>
            <div class="widget-body">
                <div class="webcam-wrap">
                    <iframe 
                        src="https://www.youtube.com/embed/JboXN7CuKxc?autoplay=1&mute=1" 
                        title="Tehran Live Cam"
                        allowfullscreen
                        loading="lazy">
                    </iframe>
                </div>
                <div class="webcam-label">Lujiazui Financial District, Pudong</div>
            </div>
        </div>

        <!-- [02] AI News -->
        <div class="widget" id="widget-02">
            <div class="widget-header">
                <span class="widget-num">02</span>
                <span class="widget-title">AI INTELLIGENCE</span>
            </div>
            <div class="item-list" id="news-list">
                <div class="loading-msg">Loading</div>
            </div>
            <div class="widget-footer" id="news-updated">—</div>
        </div>

        <!-- [03] Flight Tracker - full width -->
        <div class="widget" id="widget-03">
            <div class="widget-header">
                <span class="widget-num">03</span>
                <span class="widget-title">GLOBAL AIRSPACE — OPEN SKY NETWORK</span>
            </div>
            <div class="map-wrap">
                <div class="map-overlay">AIRCRAFT<span class="val" id="flight-count">—</span></div>
                <div id="opensky-map"></div>
            </div>
        </div>

        <!-- [04] GitHub Trending -->
        <div class="widget" id="widget-04">
            <div class="widget-header">
                <span class="widget-num">04</span>
                <span class="widget-title">GITHUB TRENDING</span>
            </div>
            <div class="item-list" id="github-list">
                <div class="loading-msg">Loading</div>
            </div>
            <div class="widget-footer" id="github-updated">—</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    // ---- Load AI News ----
    async function loadNews() {
        const list = document.getElementById('news-list');
        const updated = document.getElementById('news-updated');
        try {
            const resp = await fetch('data/ainews.json');
            const data = await resp.json();
            if (!data.items?.length) { list.innerHTML = '<div class="loading-msg">No data</div>'; return; }
            list.innerHTML = data.items.slice(0, 8).map(item => `
                <div class="item">
                    <a class="item-title" href="${item.link}" target="_blank">${item.title}</a>
                    <div class="item-meta">
                        <span class="source">${item.source}</span>
                        <span>${item.published || ''}</span>
                    </div>
                </div>
            `).join('');
            updated.textContent = `UPDATED ${data.updated}`;
        } catch (e) {
            list.innerHTML = '<div class="loading-msg">Failed</div>';
        }
    }

    // ---- Load GitHub Trending ----
    async function loadGithub() {
        const list = document.getElementById('github-list');
        const updated = document.getElementById('github-updated');
        try {
            const resp = await fetch('data/github.json');
            const data = await resp.json();
            if (!data.items?.length) { list.innerHTML = '<div class="loading-msg">No data</div>'; return; }
            list.innerHTML = data.items.slice(0, 8).map(item => `
                <div class="item">
                    <a class="item-title" href="${item.link}" target="_blank">${item.title}</a>
                    <div class="item-meta">
                        <span class="source">${item.author || 'GitHub'}</span>
                    </div>
                </div>
            `).join('');
            updated.textContent = `UPDATED ${data.updated}`;
        } catch (e) {
            list.innerHTML = '<div class="loading-msg">Failed</div>';
        }
    }

    // ---- OpenSky Map ----
    const map = L.map('opensky-map', {
        center: [20, 0],
        zoom: 2,
        zoomControl: true,
        attributionControl: false
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd',
        maxZoom: 19
    }).addTo(map);

    const planeIcon = L.divIcon({
        html: '<div style="font-size:13px;filter:hue-rotate(160deg) drop-shadow(0 0 4px #00d4aa);">✈</div>',
        iconSize: [18, 18],
        iconAnchor: [9, 9],
        className: ''
    });

    let flightMarkers = [];

    async function loadFlights() {
        try {
            const resp = await fetch('https://opensky-network.org/api/states/all');
            if (!resp.ok) return;
            const data = await resp.json();
            const states = data.states || [];

            flightMarkers.forEach(m => map.removeLayer(m));
            flightMarkers = [];

            document.querySelector('#flight-count').textContent = states.length;

            states.forEach(state => {
                if (!state) return;
                const [icao24, callsign, country, , , lon, lat, altitude, , vel, track] = state;
                if (lat == null || lon == null) return;
                const name = (callsign || '').trim() || 'UNKNOWN';
                const info = `
                    <strong>${name}</strong><br/>
                    <small>Country: ${country || '—'}</small><br/>
                    <small>Alt: ${altitude ? Math.round(altitude).toLocaleString() + ' ft' : '—'}</small><br/>
                    <small>Speed: ${vel ? Math.round(vel) + ' kt' : '—'}</small><br/>
                    <small>Track: ${track ? Math.round(track) + '°' : '—'}</small><br/>
                    <small>ICAO: ${icao24}</small>
                `;
                const marker = L.marker([lat, lon], { icon: planeIcon })
                    .bindPopup(info)
                    .addTo(map);
                flightMarkers.push(marker);
            });
        } catch (e) {
            console.warn(e);
        }
    }

    // Init
    loadNews();
    loadGithub();
    loadFlights();

    setInterval(loadNews, 60000);
    setInterval(loadGithub, 60000);
    setInterval(loadFlights, 30000);
    </script>
</body>
</html>
